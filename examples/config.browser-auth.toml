[server]
host = "127.0.0.1"
port = 11435
api_key = "local-proxy-token"
request_timeout_seconds = 3600
routing_strategy = "sticky_failover"
max_retries = 1
failure_cooldown_seconds = 60
retry_backoff_seconds = 0
retry_on_any_acp_error = false
affinity_prefix_chars = 4096

# ---------------------------------------------------------------------------
# GEMINI CLI — browser OAuth
# model_selection: NOT supported — session/new returns no configOptions.
#   Use one agent block per model.
# Pre-login: GEMINI_CLI_HOME=<dir>/gemini-a npx @google/gemini-cli@latest
#   (triggers Google browser login)
# Tokens persist in: GEMINI_CLI_HOME/.gemini/oauth_creds.json
# ---------------------------------------------------------------------------

[[agents]]
name = "gemini"
instance_id = "gemini-a"
command = "npx"
args = ["-y", "@google/gemini-cli@latest", "--model", "auto", "--experimental-acp"]
cwd = "."
models = ["gemini"]
permission = "deny"
expose_tool_updates = false
start_at_boot = false

[agents.env]
GEMINI_CLI_HOME = "${AUTH_ROOT:-$HOME/.acp-auth}/gemini-a"

# ---------------------------------------------------------------------------
# CLAUDE AGENT ACP — browser OAuth
# model_selection: SUPPORTED — confirmed via session/new.
#   configId=model, ACP values: default (Sonnet 4.6), opus (Opus 4.7),
#   haiku (Haiku 4.5), opus[1m] (Opus 4.7 1M ctx)
# Pre-login: HOME=<dir>/claude-a claude  (triggers Anthropic browser login)
# Tokens persist in: HOME/.claude/.credentials.json
# ---------------------------------------------------------------------------

[[agents]]
name = "claude"
instance_id = "claude-a"
command = "npx"
args = ["-y", "@agentclientprotocol/claude-agent-acp@latest"]
cwd = "."
models = ["claude-sonnet", "claude-opus", "claude-haiku"]
permission = "deny"
expose_tool_updates = false
start_at_boot = false

[agents.model_selection]
type = "session_config"
config_id = "model"

[agents.model_selection.values]
"claude-sonnet" = "default"
"claude-opus"   = "opus"
"claude-haiku"  = "haiku"

[agents.env]
HOME = "${AUTH_ROOT:-$HOME/.acp-auth}/claude-a"

# ---------------------------------------------------------------------------
# GITHUB COPILOT — browser OAuth (GitHub device-code flow)
# model_selection: SUPPORTED — confirmed via session/new.
#   configId=model, full model list live from copilot.
# Pre-login: COPILOT_HOME=<dir>/copilot-a copilot login
# Tokens persist in: COPILOT_HOME/config.json  (loggedInUsers key)
# ---------------------------------------------------------------------------

[[agents]]
name = "copilot"
instance_id = "copilot-a"
command = "npx"
args = ["-y", "@github/copilot@latest", "--acp", "--stdio", "--model", "gpt-5.2"]
cwd = "."
models = [
  "copilot-auto",
  "copilot-claude-sonnet-4.6",
  "copilot-claude-sonnet-4.5",
  "copilot-claude-haiku-4.5",
  "copilot-claude-opus-4.7",
  "copilot-claude-opus-4.6",
  "copilot-claude-opus-4.5",
  "copilot-gpt-5.4",
  "copilot-gpt-5.3-codex",
  "copilot-gpt-5.2-codex",
  "copilot-gpt-5.2",
  "copilot-gpt-5-mini",
  "copilot-gpt-4.1",
]
permission = "deny"
expose_tool_updates = false
start_at_boot = false

[agents.model_selection]
type = "session_config"
config_id = "model"

[agents.model_selection.values]
"copilot-auto"              = "auto"
"copilot-claude-sonnet-4.6" = "claude-sonnet-4.6"
"copilot-claude-sonnet-4.5" = "claude-sonnet-4.5"
"copilot-claude-haiku-4.5"  = "claude-haiku-4.5"
"copilot-claude-opus-4.7"   = "claude-opus-4.7"
"copilot-claude-opus-4.6"   = "claude-opus-4.6"
"copilot-claude-opus-4.5"   = "claude-opus-4.5"
"copilot-gpt-5.4"           = "gpt-5.4"
"copilot-gpt-5.3-codex"     = "gpt-5.3-codex"
"copilot-gpt-5.2-codex"     = "gpt-5.2-codex"
"copilot-gpt-5.2"           = "gpt-5.2"
"copilot-gpt-5-mini"        = "gpt-5-mini"
"copilot-gpt-4.1"           = "gpt-4.1"

[agents.env]
COPILOT_HOME = "${AUTH_ROOT:-$HOME/.acp-auth}/copilot-a"

# ---------------------------------------------------------------------------
# CODEX ACP (Zed Industries) — ChatGPT OAuth
# model_selection: SUPPORTED — confirmed via session/new.
#   configId=model, values: gpt-5.5, gpt-5.4, gpt-5.4-mini, gpt-5.3-codex, gpt-5.2
# Requires a paid ChatGPT subscription.
# Pre-login: HOME=<dir>/codex-a npx @zed-industries/codex-acp@latest
#   (first run triggers ChatGPT browser/device flow)
# Tokens persist via AuthManager in: HOME/.codex/
# ---------------------------------------------------------------------------

[[agents]]
name = "codex"
instance_id = "codex-a"
command = "npx"
args = ["-y", "@zed-industries/codex-acp@latest"]
cwd = "."
models = [
  "codex-gpt-5.5",
  "codex-gpt-5.4",
  "codex-gpt-5.4-mini",
  "codex-gpt-5.3-codex",
  "codex-gpt-5.2",
]
permission = "deny"
expose_tool_updates = false
start_at_boot = false

[agents.model_selection]
type = "session_config"
config_id = "model"

[agents.model_selection.values]
"codex-gpt-5.5"       = "gpt-5.5"
"codex-gpt-5.4"       = "gpt-5.4"
"codex-gpt-5.4-mini"  = "gpt-5.4-mini"
"codex-gpt-5.3-codex" = "gpt-5.3-codex"
"codex-gpt-5.2"       = "gpt-5.2"

[agents.env]
HOME = "${AUTH_ROOT:-$HOME/.acp-auth}/codex-a"

# ---------------------------------------------------------------------------
# OPENCODE — GitLab Duo OAuth
# model_selection: SUPPORTED via session_config (auto-detected from session/new).
#   opencode acp speaks JSON-RPC over stdio; the launched "acp" subcommand
#   does NOT take a --model flag. The proxy switches model per request via
#   session/set_config_option.
#   required = false lets the proxy fall back silently if a particular session
#   does not expose the option.
# Pre-login: XDG_DATA_HOME=<dir>/opencode-a/.local/share opencode providers login
#   (triggers GitLab OAuth browser flow)
# Tokens persist in: XDG_DATA_HOME/opencode/auth.json
#   format: {"gitlab":{"type":"oauth","refresh":"...","access":"...","expires":...}}
# ---------------------------------------------------------------------------

[[agents]]
name = "opencode-gitlab"
instance_id = "opencode-gitlab-a"
command = "npx"
args = ["-y", "opencode-ai@latest", "acp"]
cwd = "."
models = [
  "gitlab/duo-chat-sonnet-4-6",
  "gitlab/duo-chat-opus-4-7",
  "gitlab/duo-chat-haiku-4-5",
  "gitlab/duo-chat-gpt-5-codex",
]
permission = "deny"
expose_tool_updates = false
start_at_boot = false

[agents.model_selection]
type = "session_config"
required = false

[agents.model_selection.values]
"gitlab/duo-chat-sonnet-4-6"  = "gitlab/duo-chat-sonnet-4-6"
"gitlab/duo-chat-opus-4-7"    = "gitlab/duo-chat-opus-4-7"
"gitlab/duo-chat-haiku-4-5"   = "gitlab/duo-chat-haiku-4-5"
"gitlab/duo-chat-gpt-5-codex" = "gitlab/duo-chat-gpt-5-codex"

[agents.env]
XDG_DATA_HOME = "${AUTH_ROOT:-$HOME/.acp-auth}/opencode-a/.local/share"
XDG_CONFIG_HOME = "${AUTH_ROOT:-$HOME/.acp-auth}/opencode-a/.config"
